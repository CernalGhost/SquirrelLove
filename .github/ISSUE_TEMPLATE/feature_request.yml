name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the solution you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish in-game?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should SquirrelLove behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Macro / critter targeting
        - label: TomTom waypoints
        - label: UI / minimap button
        - label: Achievement tracking
        - label: Pest Control waypoints
        - label: Other
